<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html {
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #070d03;
  }
  body {
    width: 1200px;
    height: 630px;
    background: #0F1B07;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
    position: relative;
    border-radius: 12px;
    box-shadow: 0 0 80px rgba(177,252,3,0.08);
  }
  /* Subtle grid pattern */
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(177,252,3,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(177,252,3,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  /* Glow orbs */
  .glow-1 {
    position: absolute;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(177,252,3,0.12) 0%, transparent 70%);
    top: -150px; right: -100px;
    border-radius: 50%;
  }
  .glow-2 {
    position: absolute;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(177,252,3,0.08) 0%, transparent 70%);
    bottom: -100px; left: -50px;
    border-radius: 50%;
  }
  .content {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60px;
  }
  /* TX icon */
  .tx-icon {
    width: 80px; height: 80px;
    margin-bottom: 24px;
    filter: drop-shadow(0 0 30px rgba(177,252,3,0.4));
  }
  .title {
    font-size: 72px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -2px;
    margin-bottom: 8px;
    text-align: center;
  }
  .title span {
    color: #B1FC03;
  }
  .subtitle {
    font-size: 28px;
    font-weight: 500;
    color: #B1FC03;
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 40px;
    text-align: center;
  }
  .dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: #B1FC03;
    border-radius: 50%;
    margin: 0 16px;
    vertical-align: middle;
    opacity: 0.6;
  }
  /* Feature pills */
  .features {
    display: flex;
    gap: 12px;
    margin-bottom: 48px;
  }
  .pill {
    padding: 10px 22px;
    border-radius: 100px;
    border: 1px solid rgba(177,252,3,0.25);
    background: rgba(177,252,3,0.06);
    color: rgba(255,255,255,0.8);
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  /* Bottom bar */
  .bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 20px 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid rgba(177,252,3,0.1);
    background: rgba(0,0,0,0.3);
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    color: rgba(255,255,255,0.5);
    font-size: 16px;
    font-weight: 500;
  }
  .brand-logo {
    height: 28px;
    filter: invert(1);
    opacity: 0.5;
  }
  .domain {
    color: rgba(177,252,3,0.6);
    font-size: 18px;
    font-weight: 600;
    font-family: 'SF Mono', 'Fira Code', monospace;
    letter-spacing: 1px;
  }
  /* Accent line */
  .accent-line {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, #B1FC03, transparent);
  }
</style>
</head>
<body>
  <div class="accent-line"></div>
  <div class="grid-bg"></div>
  <div class="glow-1"></div>
  <div class="glow-2"></div>

  <div class="content">
    <img src="tx-icon.svg" class="tx-icon" alt="TX">

    <div class="title">ALL in ONE <span>TX</span></div>

    <div class="subtitle">
      Stake <span class="dot"></span> PSE <span class="dot"></span> Explore <span class="dot"></span> Track
    </div>

    <div class="features">
      <div class="pill">Stake TX Tokens</div>
      <div class="pill">PSE Score Lookup</div>
      <div class="pill">Rewards Calculator</div>
      <div class="pill">Validator Explorer</div>
      <div class="pill">RWA Tracker</div>
    </div>
  </div>

  <div class="bottom">
    <div class="brand">
      <img src="silk-nodes-logo.png" class="brand-logo" alt="Silk Nodes">
      Built by Silk Nodes
    </div>
    <div class="domain">tx.silknodes.io</div>
  </div>
</body>
</html>
