name: Update PSE Network Score

on:
  schedule:
    # Every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

# See deploy.yml for rationale — opt JavaScript actions into Node 24 ahead
# of the June 2026 forced migration.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-score:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Calculate PSE Network Score
        run: node scripts/update-pse-network-score.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/pse-network-score.json
          git diff --staged --quiet || (git commit -m "chore: update PSE network score cache" && git push)
