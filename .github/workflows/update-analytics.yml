name: Update Analytics Data

# DEPRECATED: the VM-based silknodes-daily-analytics systemd timer now owns
# all analytics files (see vm-service/collect-daily-analytics.mjs). The
# scheduled run has been disabled to stop racing the VM's pushes. This
# workflow is kept as workflow_dispatch-only for emergency manual runs
# while PR C removes it entirely.
on:
  # schedule:
  #   - cron: "15 0 * * *"  # disabled — VM timer owns this now
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch on-chain data
        run: node scripts/update-analytics.mjs

      # Commit any partial progress, even if the fetch step failed partway
      # through (e.g. Hasura/RPC blip on day 4 of a 6-day backfill). Without
      # `if: always()`, any non-zero exit from the fetch step would cause
      # these to be skipped and all progress thrown away when the runner
      # tears down, forcing the next run to redo the work from scratch.
      - name: Check for changes
        id: changes
        if: always()
        run: |
          git diff --quiet src/data/analytics/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: always() && steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/analytics/
          git commit -m "chore: update analytics data $(date -u +%Y-%m-%d)"
          git push

      # Note: deploy.yml is triggered automatically by `push` to main, so an
      # explicit `gh workflow run deploy.yml` step here was both redundant
      # AND broken (GITHUB_TOKEN from a scheduled run cannot dispatch other
      # workflows: HTTP 403 "Resource not accessible by integration"). The
      # push above is sufficient to trigger a new Pages build.
