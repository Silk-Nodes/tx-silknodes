name: Update Analytics Data

on:
  schedule:
    # Run daily at 00:15 UTC
    - cron: "15 0 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch on-chain data
        run: node scripts/update-analytics.mjs

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/data/analytics/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/analytics/
          git commit -m "chore: update analytics data $(date -u +%Y-%m-%d)"
          git push

      - name: Trigger deploy
        if: steps.changes.outputs.changed == 'true'
        run: gh workflow run deploy.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
