name: Analytics Data Health Check

# External liveness check for every analytics file the VM owns. Reads the
# committed JSONs from main and fails (sending a notification email) if any
# file's data is older than its threshold. See scripts/check-feed-freshness.mjs
# for the list of files and per-file thresholds.
#
# Schedule: every 20 minutes. Avoids :00 and :30 to spread API load across
# the hour. At most 3 consecutive missed daily runs would go unnoticed before
# this would fire, and it fires continuously once something is broken.

on:
  schedule:
    - cron: "7,27,47 * * * *"
  workflow_dispatch:

# See deploy.yml for rationale — opt JavaScript actions into Node 24 ahead
# of the June 2026 forced migration so health-check runs don't log warnings.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify all analytics files are fresh
        run: node scripts/check-feed-freshness.mjs
